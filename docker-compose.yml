services:
  mysql:
    image: mysql:8.4
    container_name: fintrack-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: fintrack
      MYSQL_USER: fintrack
      MYSQL_PASSWORD: fintrack
    ports:
      - "3306:3306"
    volumes:
      - fintrack_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "fintrack", "-pfintrack"]
      interval: 10s
      timeout: 5s
      retries: 8

volumes:
  fintrack_mysql_data:
